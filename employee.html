<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced JS Employee Management System (MVC-like)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="p-4 md:p-10">

    <div class="max-w-6xl mx-auto bg-white shadow-2xl rounded-xl p-8 md:p-10">
        <h1 class="text-4xl md:text-5xl font-extrabold text-gray-800 mb-8 border-b pb-4 text-center">
            Advanced Employee Management Dashboard
        </h1>

        <div class="mb-12 p-6 md:p-8 bg-blue-50 rounded-xl border border-blue-200">
            <h2 id="form-title" class="text-2xl md:text-3xl font-bold text-blue-800 mb-6">Add New Employee</h2>
            
            <form id="employee-form" class="space-y-6">
                <input type="hidden" id="employee-id">

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    
                    <div>
                        <label for="name" class="block text-base font-semibold text-gray-700 mb-1">Employee Name</label>
                        <input type="text" id="name" required
                            class="block w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 text-lg"
                            placeholder="Enter full name">
                    </div>

                    <div>
                        <label for="jobTitle" class="block text-base font-semibold text-gray-700 mb-1">Job Title</label>
                        <input type="text" id="jobTitle" required
                            class="block w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 text-lg"
                            placeholder="e.g., Senior Developer">
                    </div>

                    <div>
                        <label for="department" class="block text-base font-semibold text-gray-700 mb-1">Department</label>
                        <input type="text" id="department" required value="Unassigned"
                            class="block w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 text-lg"
                            placeholder="e.g., Engineering">
                    </div>

                    <div>
                        <label for="salary" class="block text-base font-semibold text-gray-700 mb-1">Annual Salary</label>
                        <input type="number" id="salary" required value="50000" min="0"
                            class="block w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 text-lg"
                            placeholder="e.g., 75000">
                    </div>

                    <div>
                        <label for="performanceCode" class="block text-base font-semibold text-gray-700 mb-1">Performance Code (A/B/C)</label>
                        <select id="performanceCode" required
                            class="block w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 text-lg uppercase">
                            <option value="" disabled selected>Select Performance</option>
                            <option value="A">A - Excellent</option>
                            <option value="B">B - Good</option>
                            <option value="C">C - Needs Improvement</option>
                        </select>
                    </div>
                </div>

                <div class="pt-4 flex space-x-4">
                    <button type="submit" id="submit-button"
                            class="px-6 py-3 bg-blue-600 text-white text-lg font-medium rounded-xl shadow-lg hover:bg-blue-700 transition duration-150 ease-in-out transform hover:scale-105">
                        Save New Employee
                    </button>
                    <button type="button" onclick="resetForm()"
                       class="px-6 py-3 bg-gray-500 text-white text-lg font-medium rounded-xl shadow-lg hover:bg-gray-600 transition duration-150 ease-in-out transform hover:scale-105">
                        Clear Form
                    </button>
                </div>
                <div id="status-message" class="text-lg font-semibold pt-2"></div>
            </form>
        </div>

        <h2 class="text-3xl md:text-4xl font-bold text-gray-700 mb-6">Current Employees List</h2>

        <div id="employee-list-container" class="overflow-x-auto shadow-2xl rounded-xl">
        </div>
    </div>
    
    <div id="deleteModal" class="modal-backdrop hidden flex justify-center items-center p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-md p-6 md:p-8">
            <h3 class="text-2xl font-bold text-red-600 mb-4 border-b pb-3">Confirm Deletion</h3>
            <p class="text-lg text-gray-700 mb-6">
                Are you absolutely sure you want to delete this employee record? This action cannot be undone.
            </p>
            <div class="flex justify-end space-x-4">
                <button type="button" onclick="closeDeleteModal()"
                        class="px-5 py-2 bg-gray-200 text-gray-800 text-lg font-medium rounded-lg shadow-sm hover:bg-gray-300 transition duration-150">
                    Cancel
                </button>
                <button type="button" id="confirmDeleteButton" onclick="executeDelete()"
                        class="px-5 py-2 bg-red-600 text-white text-lg font-medium rounded-lg shadow-md hover:bg-red-700 transition duration-150">
                    Delete Employee
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
